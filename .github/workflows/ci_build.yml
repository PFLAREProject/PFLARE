name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # run on the 1st of the month for new petsc release
  # do it at 2am UTC so that the CI builds have finished
  schedule:
    - cron: '0 2 1 * *'    

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:       

jobs:
  setup:
    runs-on: ubuntu-22.04
    outputs:
      branch: ${{ steps.determine_branch.outputs.branch }}
      commit: ${{ github.sha }}      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine branch
        id: determine_branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: free disk space
        run: |
          docker system prune --volumes -af            

  gnu_debug:
    runs-on: ubuntu-22.04
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image with debug PETSc
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          context: .
          file: ./dockerfiles/Dockerfile
          build-args: |
            ARCH=arch-linux-c-debug

  gnu_debug_malloc_dump:
    runs-on: ubuntu-22.04
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image with debug PETSc and malloc dump flag
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          context: .
          file: ./dockerfiles/Dockerfile
          build-args: |
            ARCH=arch-linux-c-debug
            MALLOC_DUMP=true

  gnu_debug_valgrind:
    runs-on: ubuntu-22.04
    needs: setup
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image and run tests_short with valgrind
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          context: .
          file: ./dockerfiles/Dockerfile_valgrind
          build-args: |
            ARCH=arch-linux-c-debug

  gnu_opt:
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image for non-pull-request events
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: true
          context: .
          file: ./dockerfiles/Dockerfile
          tags: stevendargaville/pflare:latest
          build-args: |
            ARCH=arch-linux-c-opt

      - name: Build Docker image for pull requests
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          load: true
          context: .
          file: ./dockerfiles/Dockerfile
          tags: pflare:pr-ci
          build-args: |
            ARCH=arch-linux-c-opt

      - name: Build notebook CI image and execute notebooks for pull requests
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          file: ./dockerfiles/Dockerfile_notebook
          build-args: |
            BASE_IMAGE=pflare:pr-ci

  gnu_opt_64_bit:
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build Docker image for pull requests with 64-bit PETSc
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          context: .
          file: ./dockerfiles/Dockerfile_64_bit
          tags: stevendargaville/pflare_64_bit:latest
          build-args: |
            ARCH=arch-linux-c-opt

  gnu_opt_kokkos:
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image with KOKKOS and PETSc
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          context: .
          file: ./dockerfiles/Dockerfile_kokkos
          build-args: |
            ARCH=arch-linux-c-opt
            
  gnu_opt_kokkos_malloc_dump:
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image with KOKKOS and PETSc and malloc dump flag
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          context: .
          file: ./dockerfiles/Dockerfile_kokkos
          build-args: |
            ARCH=arch-linux-c-opt
            MALLOC_DUMP=true
        
  gnu_debug_kokkos_valgrind:
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image and run tests_short with valgrind and KOKKOS
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          context: .
          file: ./dockerfiles/Dockerfile_kokkos_valgrind
          build-args: |
            ARCH=arch-linux-c-debug

  gnu_opt_64_bit_kokkos:
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image with KOKKOS and 64-bit PETSc
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          context: .
          file: ./dockerfiles/Dockerfile_kokkos
          build-args: |
            ARCH=arch-linux-c-opt-64bit

  # Use 2 OMP threads by default as the github action runners have 2 cores by default
  gnu_opt_omp_kokkos:
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image with KOKKOS OMP backend and PETSc
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          context: .
          file: ./dockerfiles/Dockerfile_kokkos
          build-args: |
            OMP_NUM_THREADS=2
            ARCH=arch-linux-c-opt-omp
            
  intel_opt:
    runs-on: ubuntu-22.04
    needs: [setup]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image with PETSc and Intel
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          context: .
          file: ./dockerfiles/Dockerfile_intel
          build-args: |
            ARCH=arch-linux-intel

  notebook_tutorial:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-22.04
    needs: [gnu_opt]
    steps:
      - name: Build notebook CI image and execute notebooks
        uses: docker/build-push-action@v2
        with:
          platforms: linux/amd64
          push: false
          file: ./dockerfiles/Dockerfile_notebook
          build-args: |
            BASE_IMAGE=stevendargaville/pflare:latest
            
  # Now pflare tracks petsc main, we check to see if this commit can still be built
  # through the petsc configure
  # We do this by checking out petsc main and just replacing the hash it pulls down
  # for PFLARE to the hash from the merge commit for this branch
  gnu_petsc_config:
    runs-on: ubuntu-22.04
    needs: [setup]
    env:
      BRANCH: ${{ needs.setup.outputs.branch }}
      COMMIT: ${{ needs.setup.outputs.commit }}
    steps:
      - name: Test build through PETSc configure
        shell: bash
        run: |
          set -euo pipefail
          export BRANCH="${{ env.BRANCH }}"
          export COMMIT="${{ env.COMMIT }}"
          echo "Using branch: ${BRANCH}"
          echo "Using commit: ${COMMIT}"

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            autoconf automake bash-completion ca-certificates chrpath cmake curl \
            g++ gcc gfortran git less libblis-serial-dev liblapack-dev libtool \
            locales m4 make openssl pkg-config ripgrep zlib1g-dev python3-virtualenv \
            python3-venv python3-dev wget valgrind vim

          export PETSC_DIR="$(pwd)/petsc"
          export PETSC_ARCH="arch-linux-c-debug"

          git clone --depth=1 --branch=main https://gitlab.com/petsc/petsc.git
          cd petsc

          python3 - "$COMMIT" <<'PY'
          import pathlib, sys
          commit = sys.argv[1]
          path = pathlib.Path("config/BuildSystem/config/packages/PFLARE.py")
          lines = path.read_text().splitlines()
          found = False
          for i, line in enumerate(lines):
              if line.strip().startswith("self.gitcommit"):
                  # Preserve indentation
                  indent = line[:line.find("self.gitcommit")]
                  lines[i] = f"{indent}self.gitcommit              = '{commit}'"
                  found = True
                  break
          if not found:
              sys.exit("gitcommit line not found in PFLARE.py")
          path.write_text("\n".join(lines) + "\n")
          PY

          python3 configure \
            --with-debugging=1 \
            --download-metis \
            --download-parmetis \
            --download-fblaslapack \
            --download-kokkos \
            --download-kokkos-kernels \
            --download-mpich \
            --download-pflare

          make PETSC_DIR="${PETSC_DIR}" PETSC_ARCH="${PETSC_ARCH}"
          make PETSC_DIR="${PETSC_DIR}" PETSC_ARCH="${PETSC_ARCH}" check
          
